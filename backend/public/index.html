  <script>
    // Decode redirect from 404.html (GitHub Pages SPA routing)
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
      var p = window.location.search.slice(1);
      if (p.indexOf('p=') === 0) {
        var path = '/' + decodeURIComponent(p.slice(2).replace(/&/g, '?').replace(/~and~/g, '&'));
        history.replaceState(null, null, path + window.location.hash);
      }
    })();
  </script>
