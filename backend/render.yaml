services:
  - type: web
    name: iyoimmo-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/db
      - key: UPLOAD_PATH
        value: /var/data/uploads
      - key: FRONTEND_URL
        value: https://chobrandone.github.io
    disk:
      name: iyoimmo-data
      mountPath: /var/data
      sizeGB: 1
