<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IYO Immo</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Encodes the full URL into the query string so the main page can decode it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '')) +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
